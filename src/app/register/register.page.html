<ion-content [fullscreen]="true">
  <div class="register-container">

    <!-- Logo -->
    <div class="logo-circle">
      <ion-icon name="language-outline"></ion-icon>
    </div>

    <h1 class="app-title">EduEnglish!</h1>
    <p class="app-subtitle">Buat akun & mulai petualangan belajarmu 🎉</p>

    <!-- Form Card -->
    <div class="form-card">

      <!-- Nama -->
      <ion-item class="input-item" [class.item-error]="namaError">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input
          type="text"
          placeholder="Nama Lengkap"
          [(ngModel)]="nama"
          (ngModelChange)="onNamaChange()"
          clearInput>
        </ion-input>
      </ion-item>
      <p class="error-text" *ngIf="namaError">{{ namaError }}</p>

      <!-- Email -->
      <ion-item class="input-item" [class.item-error]="emailError">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          (ngModelChange)="onEmailChange()"
          clearInput>
        </ion-input>
      </ion-item>
      <p class="error-text" *ngIf="emailError">{{ emailError }}</p>

      <!-- Password -->
      <ion-item class="input-item" [class.item-error]="passwordError">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          [(ngModel)]="password"
          (ngModelChange)="onPasswordChange()">
        </ion-input>
        <ion-icon
          [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
          slot="end"
          (click)="togglePassword()">
        </ion-icon>
      </ion-item>
      <p class="error-text" *ngIf="passwordError">{{ passwordError }}</p>

      <!-- Konfirmasi Password -->
      <ion-item class="input-item" [class.item-error]="confirmPasswordError">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Konfirmasi Password"
          [(ngModel)]="confirmPassword"
          (ngModelChange)="onConfirmPasswordChange()">
        </ion-input>
        <ion-icon
          [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"
          slot="end"
          (click)="toggleConfirmPassword()">
        </ion-icon>
      </ion-item>
      <p class="error-text" *ngIf="confirmPasswordError">{{ confirmPasswordError }}</p>

    </div>

    <!-- Tombol -->
    <div class="btn-group">
      <ion-button expand="block" class="btn-register" (click)="register()">
        Daftar Sekarang
      </ion-button>
    </div>

    <div class="divider">
      <span>atau</span>
    </div>

    <p class="login-text">
      Sudah punya akun?
      <span routerLink="/login">Masuk</span>
    </p>

    <p class="footer-text">© 2026 EduEnglish!. All rights reserved.</p>

  </div>
</ion-content>
