<ion-content [fullscreen]="true">
  <div class="register-container">

    <!-- Logo -->
    <div class="logo-circle">
      <ion-icon name="language-outline"></ion-icon>
    </div>

    <h1 class="app-title">EnglishUp!</h1>
    <p class="app-subtitle">Buat akun & mulai petualangan belajarmu 🎉</p>

    <!-- Form Card -->
    <div class="form-card">

      <ion-item class="input-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input
          type="text"
          placeholder="Nama Lengkap"
          [(ngModel)]="nama"
          clearInput>
        </ion-input>
      </ion-item>

      <ion-item class="input-item">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          clearInput>
        </ion-input>
      </ion-item>

      <ion-item class="input-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Password"
          [(ngModel)]="password">
        </ion-input>
        <ion-icon
          [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
          slot="end"
          (click)="togglePassword()">
        </ion-icon>
      </ion-item>

      <ion-item class="input-item">
        <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
        <ion-input
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Konfirmasi Password"
          [(ngModel)]="confirmPassword">
        </ion-input>
        <ion-icon
          [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"
          slot="end"
          (click)="toggleConfirmPassword()">
        </ion-icon>
      </ion-item>

    </div>

    <!-- Tombol -->
    <div class="btn-group">
      <ion-button expand="block" class="btn-register" (click)="register()">
        Daftar Sekarang
      </ion-button>
    </div>

    <div class="divider">
      <span>atau</span>
    </div>

    <p class="login-text">
      Sudah punya akun?
      <span routerLink="/login">Masuk</span>
    </p>

    <p class="footer-text">© 2025 EnglishUp!. All rights reserved.</p>

  </div>
</ion-content>
